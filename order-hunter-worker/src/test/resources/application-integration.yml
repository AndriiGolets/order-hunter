spring:
  application:
    name: order-hunter-worker

# Overrides for OrderHunterIntegrationTest (see integration-tests-plan.md).
order-hunter:
  disable-jitter-randomize: true
  between-polls-jitter-max: 500
  polling-timeout: 15000
  saving-timeout: 15000
  max-parallel-orders-to-save-threads: 5
  # Avoid ticking before JUnit @BeforeEach configures MockWebServer dispatch rules.
  worker-auto-start: false

logging:
  level:
    root: WARN
    name.golets.order.hunter.worker: DEBUG

management:
  otlp:
    metrics:
      export:
        enabled: false
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: http://localhost:4318/v1/traces
    resource-attributes:
      service.name: ${spring.application.name}
  tracing:
    enabled: true
    sampling:
      probability: 1.0
